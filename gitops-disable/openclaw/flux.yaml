apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw-instance
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/openclaw
  prune: true
  dependsOn:
    - name: namespaces
    - name: openclaw-operator
    - name: external-secrets-sync
  sourceRef:
    kind: GitRepository
    name: flux-system
