apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: f1replaytiming
  namespace: f1replaytiming
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-gateway
  hostnames:
    - "f1live.menghi.uy"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api"
      backendRefs:
        - name: f1replaytiming-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: f1replaytiming-frontend
          port: 3000
