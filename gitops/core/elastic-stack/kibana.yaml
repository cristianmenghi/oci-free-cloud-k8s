apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: elastic
  namespace: elastic-system
spec:
  version: 9.3.3
  count: 1
  elasticsearchRef:
    name: elastic
  # TLS para HTTP - Kibana solo acceso interno, self-signed OK
  http:
    tls:
      selfSignedCertificate:
        disabled: false
  # Clave de encriptación para saved objects desde OCI Vault
  secureSettings:
    - secretName: kibana-secure-settings
  config:
    # Agentless solo es para Elastic Cloud — deshabilitar en self-managed
    xpack.fleet.agentless.enabled: false
    # Fleet usa FQDN público para que agentes externos puedan conectarse
    xpack.fleet.agents.elasticsearch.hosts:
      - "https://elk.menghi.uy:9200"
    xpack.fleet.agents.fleet_server.hosts:
      - "https://elk.menghi.uy:8220"
    # Output explícito con FQDN público — evita que el UI quede bloqueado
    # y garantiza que los agentes usen la URL externa para enviar datos
    xpack.fleet.outputs:
      - id: fleet-default-output
        name: default
        type: elasticsearch
        hosts:
          - "https://elk.menghi.uy:9200"
        is_default: true
        is_default_monitoring: true
        ssl:
          # El cert de ES es self-signed de ECK — deshabilitar verificación
          # o distribuir el CA de ECK a los agentes
          verification_mode: "none"
    xpack.fleet.packages:
      - name: system
        version: latest
      - name: elastic_agent
        version: latest
      - name: fleet_server
        version: latest
      - name: endpoint
        version: latest
    xpack.fleet.agentPolicies:
      - name: Fleet Server on ECK policy
        id: eck-fleet-server
        namespace: default
        monitoring_enabled:
          - logs
          - metrics
        package_policies:
          - name: fleet_server-1
            id: fleet_server-1
            package:
              name: fleet_server
      - name: Elastic Agent on ECK policy
        id: eck-agent
        namespace: default
        monitoring_enabled:
          - logs
          - metrics
        package_policies:
          - name: system-1
            id: system-1
            package:
              name: system
          - name: endpoint-1
            id: endpoint-1
            package:
              name: endpoint
  podTemplate:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
      containers:
        - name: kibana
          resources:
            requests:
              memory: 2Gi
              cpu: 100m
            limits:
              memory: 2Gi
          # startupProbe: permite hasta 10 min de boot (20 intentos * 30s)
          # El readinessProbe no se activa hasta que el startup tenga éxito
          startupProbe:
            httpGet:
              path: /login
              port: 5601
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 20
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /login
              port: 5601
              scheme: HTTPS
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
