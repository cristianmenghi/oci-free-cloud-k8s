apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: elastic
  namespace: elastic-system
spec:
  version: 9.3.3
  count: 1
  elasticsearchRef:
    name: elastic
  # TLS para HTTP - Kibana solo acceso interno, self-signed OK
  http:
    tls:
      selfSignedCertificate:
        disabled: false
  # Clave de encriptación para saved objects desde OCI Vault
  secureSettings:
    - secretName: kibana-secure-settings
  config:
    # Agentless solo es para Elastic Cloud — deshabilitar en self-managed
    xpack.fleet.agentless.enabled: false
    # Estos dos settings son el mecanismo oficial para actualizar el output
    # default de Fleet desde el config file (no via API)
    xpack.fleet.agents.elasticsearch.hosts:
      - "https://elk.menghi.uy:9200"
    xpack.fleet.agents.fleet_server.hosts:
      - "https://elk.menghi.uy:8220"
    # Pre-instalar paquetes necesarios (no crea políticas preconfigured)
    xpack.fleet.packages:
      - name: system
        version: latest
      - name: elastic_agent
        version: latest
      - name: fleet_server
        version: latest
      - name: endpoint
        version: latest
  podTemplate:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
      containers:
        - name: kibana
          resources:
            requests:
              memory: 2Gi
              cpu: 100m
            limits:
              memory: 2Gi
          # startupProbe: permite hasta 10 min de boot (20 intentos * 30s)
          # El readinessProbe no se activa hasta que el startup tenga éxito
          startupProbe:
            httpGet:
              path: /login
              port: 5601
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 20
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /login
              port: 5601
              scheme: HTTPS
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
