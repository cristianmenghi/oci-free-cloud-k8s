apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: my-agent
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  storage:
    persistence:
      enabled: true
      size: 10Gi
  config:
    raw:
      gateway:
        auth:
          mode: none
        controlUi:
          allowedOrigins:
            - "*"
          dangerouslyDisableDeviceAuth: true
      agents:
        defaults:
          model:
            primary: "deepseek/chat"
