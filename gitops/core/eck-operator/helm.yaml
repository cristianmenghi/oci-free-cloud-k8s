apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: elastic
  namespace: elastic-system
spec:
  interval: 1h
  url: https://helm.elastic.co
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eck-operator
  namespace: elastic-system
spec:
  interval: 1h
  chart:
    spec:
      chart: eck-operator
      version: "3.3.2"
      sourceRef:
        kind: HelmRepository
        name: elastic
      interval: 1h
  install:
    crds: CreateReplace
    createNamespace: false
  upgrade:
    crds: CreateReplace
  values:
    # Affinity para ARM64
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - arm64
