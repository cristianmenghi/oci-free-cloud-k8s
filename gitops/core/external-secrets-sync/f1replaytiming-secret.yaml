apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: f1replaytiming-basic-auth
  namespace: f1replaytiming
spec:
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oracle-vault
  target:
    name: f1replaytiming-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: .htpasswd
      remoteRef:
        key: f1replaytiming-htpasswd
