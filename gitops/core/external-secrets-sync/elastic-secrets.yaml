apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kibana-secure-settings
  namespace: elastic-system
spec:
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oracle-vault
  target:
    name: kibana-secure-settings
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      data:
        xpack.encryptedSavedObjects.encryptionKey: "{{ .key }}"
  data:
    - secretKey: key
      remoteRef:
        key: kibana-encryption-key-v1
        version: CURRENT
